# URL de connexion ŕ la base de données MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/security_db

# Nom d'utilisateur et mot de passe pour la connexion
spring.datasource.username=root
spring.datasource.password=root

# Nom de la classe du driver JDBC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Plateforme de base de données pour Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Stratégie de génération du schéma de la base de données
#spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
# Affichage des requętes SQL dans la console
spring.jpa.show-sql=true

# Port de l'application
server.port=8080
